<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#FFC107" />
    <title>Register - Pasugo</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/mobile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .password-wrapper {
        position: relative;
      }
      .password-wrapper input {
        padding-right: 44px;
      }
      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #999;
        font-size: 16px;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .password-toggle:hover {
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="mobile-container-view">
        <div class="top-header">
          <div class="nav-bar">
            <a href="../index.html" class="nav-back">←</a>
            <a href="login.html" class="nav-action-link">Login</a>
          </div>
          <div class="header-content">
            <h1>Register</h1>
            <p>Create your new account to start using Pasugo services.</p>
          </div>
        </div>

        <div class="main-container">
          <div
            id="errorMessage"
            class="alert alert-error"
            style="display: none"
          ></div>
          <div
            id="successMessage"
            class="alert alert-success"
            style="display: none"
          ></div>

          <form id="registerForm" data-user-type="customer" novalidate>
            <input
              type="hidden"
              id="userType"
              name="userType"
              value="customer"
            />

            <div class="form-group">
              <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Full Name"
                required
              />
            </div>

            <div class="form-group">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Email Address"
                required
              />
            </div>

            <div class="form-group">
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Phone Number"
                required
              />
            </div>

            <div class="form-group">
              <textarea
                id="address"
                name="address"
                placeholder="Address"
                rows="2"
                required
              ></textarea>
            </div>

            <div class="form-group password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required
              />
              <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('password', this)"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
              <div
                class="password-strength"
                id="passwordStrength"
                style="display: none; margin-top: 10px; font-size: 12px"
              >
                <div
                  class="strength-bar"
                  style="height: 4px; background: #ddd; border-radius: 2px"
                >
                  <div
                    class="strength-indicator"
                    id="strengthIndicator"
                    style="height: 100%; width: 0%; transition: 0.3s"
                  ></div>
                </div>
                <small id="strengthText"></small>
              </div>
            </div>

            <div class="form-group password-wrapper">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Confirm Password"
                required
              />
              <button
                type="button"
                class="password-toggle"
                onclick="togglePassword('confirmPassword', this)"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>

            <div class="checkbox-group">
              <input
                type="checkbox"
                id="termsCheckbox"
                name="termsCheckbox"
                required
              />
              <label for="termsCheckbox">
                I agree to the
                <a
                  href="#"
                  style="
                    color: var(--primary-black);
                    text-decoration: underline;
                  "
                  >Terms & Conditions</a
                >
              </label>
            </div>

            <button type="submit" class="btn btn-primary">Sign Up</button>
          </form>

          <div style="text-align: center; margin-top: 20px">
            <span style="font-size: 12px; color: #666">Or register with</span>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      function togglePassword(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon = btn.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", setupPasswordStrength);
      } else {
        setupPasswordStrength();
      }

      function setupPasswordStrength() {
        const passwordInput = document.getElementById("password");
        const strengthDiv = document.getElementById("passwordStrength");
        const strengthBar = document.getElementById("strengthIndicator");
        const strengthText = document.getElementById("strengthText");

        if (!passwordInput) return;

        passwordInput.addEventListener("input", (e) => {
          const val = e.target.value;
          if (val.length > 0) strengthDiv.style.display = "block";
          else strengthDiv.style.display = "none";

          let strength = 0;
          if (val.length > 5) strength += 33;
          if (val.match(/[A-Z]/)) strength += 33;
          if (val.match(/[0-9]/)) strength += 34;

          if (strengthBar) {
            strengthBar.style.width = strength + "%";
            strengthBar.style.backgroundColor =
              strength < 50 ? "#dc3545" : strength < 90 ? "#ffc107" : "#28a745";
          }
        });
      }
    </script>
  </body>
</html>
